<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coda Ufficio - Admin</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Controlli Coda Ufficio</h1>

      <section class="people" id="people"></section>

      <section class="controls">
        <h2>Configura colleghi</h2>
        <div class="row">
          <input id="newColleagueName" type="text" placeholder="Nome collega" />
          <button data-action="add-user">Aggiungi collega</button>
        </div>
        <p id="newColleagueStatus"></p>

        <h2>Gestione colleghi</h2>
        <div id="usersControls" class="users-controls"></div>

        <h2>Coda globale</h2>
        <div class="row">
          <button data-action="queue-reset">Reset coda (0)</button>
        </div>

        <h2>Suono avanzamento globale</h2>
        <div class="row">
          <button data-action="sound-enable">Abilita suono</button>
          <button data-action="sound-disable">Disabilita suono</button>
        </div>
        <p id="soundStatusGlobal"></p>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
